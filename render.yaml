services:
  - type: web
    name: trifield-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: CHROMA_PATH
        value: /opt/render/project/src/chroma_db
      - key: ANTHROPIC_API_KEY
        sync: false
